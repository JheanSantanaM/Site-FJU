<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FJUni</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --cor-tema: #2c3e50; --gradiente: linear-gradient(135deg, #2c3e50, #000000); }
        body { font-family: 'Poppins', sans-serif; background: #eceff1; margin: 0; }
        .hero { background: var(--gradiente); padding: 60px 20px; color: white; text-align: center; border-radius: 0 0 50px 50px; }
        .container { max-width: 900px; margin: -50px auto 50px; background: white; padding: 40px; border-radius: 30px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin: 30px 0; border-radius: 20px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .btn-voltar { display: inline-block; background: #000; color: white; padding: 12px 30px; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="hero">
        <i class="fas fa-graduation-cap fa-4x"></i>
        <h1>FJUNI</h1>
    </div>
    <div class="container">
        <button onclick="window.history.back()" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar</button>
        <div class="info-section" style="border-left: 5px solid var(--cor-tema); padding-left: 20px;">
            <h2>Fé e Inteligência</h2>
            <p>O <strong>FJUni</strong> apoia jovens que estão na faculdade ou se preparando para entrar. Oferece orientação de carreira e suporte espiritual para que o sucesso profissional ande junto com a fé.</p>
        </div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/u7q9nWwxomE" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
