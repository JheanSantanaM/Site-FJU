<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídia FJU</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --cor-tema: #004e92; --gradiente: linear-gradient(135deg, #004e92, #000428); }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        .hero { background: var(--gradiente); padding: 60px 20px; color: white; text-align: center; border-radius: 0 0 50px 50px; }
        .container { max-width: 900px; margin: -50px auto 50px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin: 30px 0; border-radius: 20px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .btn-voltar { display: inline-block; background: white; color: var(--cor-tema); padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-bottom: 20px; cursor: pointer; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .info-section { border-left: 5px solid var(--cor-tema); padding-left: 20px; }
    </style>
</head>
<body>
    <div class="hero">
        <i class="fas fa-camera fa-4x"></i>
        <h1>MÍDIA FJU</h1>
    </div>
    <div class="container">
        <button onclick="window.history.back()" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar</button>
        <div class="info-section">
            <h2>Comunicação e Criatividade</h2>
            <p>O <strong>Mídia</strong> é responsável por toda a comunicação da FJU. Jovens aprendem fotografia, edição de vídeo, design e jornalismo, usando essas ferramentas para registrar as mudanças de vida e espalhar boas notícias nas redes sociais.</p>
        </div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/S26A_2f69YQ" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
