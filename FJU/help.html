<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto HELP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --cor-tema: #f1c40f; --gradiente: linear-gradient(135deg, #f1c40f, #f39c12); }
        body { font-family: 'Poppins', sans-serif; background: #fdfcf0; margin: 0; color: #2c3e50; }
        .hero { background: var(--gradiente); padding: 60px 20px; color: white; text-align: center; border-radius: 0 0 50px 50px; }
        .container { max-width: 900px; margin: -50px auto 50px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin: 30px 0; border-radius: 20px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .btn-voltar { display: inline-block; background: #2c3e50; color: white; padding: 12px 30px; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="hero">
        <i class="fas fa-hand-holding-heart fa-4x"></i>
        <h1>PROJETO HELP</h1>
    </div>
    <div class="container">
        <button onclick="window.history.back()" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar</button>
        <div class="info-section" style="border-left: 5px solid var(--cor-tema); padding-left: 20px;">
            <h2>Superação e Apoio</h2>
            <p>O <strong>Help</strong> oferece apoio emocional a jovens que enfrentam depressão e automutilação. Com o lema "Não Te Julgo, Te Ajudo", voluntários realizam ações de escuta ativa e acolhimento para provar que vale a pena viver.</p>
        </div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/ZKvUdR0u4yY" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
