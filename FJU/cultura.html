<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultura FJU</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --cor-tema: #9b59b6; --gradiente: linear-gradient(135deg, #9b59b6, #8e44ad); }
        body { font-family: 'Poppins', sans-serif; background: #f9f4fb; margin: 0; }
        .hero { background: var(--gradiente); padding: 60px 20px; color: white; text-align: center; border-radius: 0 0 50px 50px; }
        .container { max-width: 900px; margin: -50px auto 50px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin: 30px 0; border-radius: 20px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .btn-voltar { display: inline-block; background: white; color: var(--cor-tema); border: 1px solid var(--cor-tema); padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="hero">
        <i class="fas fa-masks-theater fa-4x"></i>
        <h1>CULTURA FJU</h1>
    </div>
    <div class="container">
        <button onclick="window.history.back()" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar</button>
        <div class="info-section" style="border-left: 5px solid var(--cor-tema); padding-left: 20px;">
            <h2>A Arte de Salvar</h2>
            <p>O <strong>Cultura</strong> desenvolve talentos no teatro, dança e música. O projeto usa a arte como ferramenta de expressão para levar mensagens de fé e transformar a realidade de jovens através da criatividade.</p>
        </div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/xZnfM1Jhvsk" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
