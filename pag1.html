<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal FJU</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #F4F7F6;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        /* Usando a imagem da logo que você anexou */
        .logo-container img {
            max-width: 300px;
            height: auto;
        }

        h1 {
            color: #1A1C29;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .btn-entrar {
            display: inline-block;
            background-color: #1A1C29;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-entrar:hover {
            background-color: #E63946;
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(230, 57, 70, 0.3);
        }
    </style>
</head>
<body>
    
    <div class="logo-container">
        <img src="FJU.png" alt="Logo FJU">
    </div>

    <h1>Bem-vindo ao Portal</h1>
    
    <a href="index.html" class="btn-entrar">Acessar Grupos</a>

</body>
</html>
